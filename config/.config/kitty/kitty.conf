# Kitty terminal configuration

# Shell integration (disabilitata per non sovrascrivere PROMPT_COMMAND custom)
shell_integration disabled

# Usa terminale standard per compatibilità con sudo e tool di sistema
term xterm-256color

# Font
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        14.0

# Cursor
cursor_blink_interval 0.5
cursor_shape block

# Scrollback
scrollback_lines 10000

# Window
window_padding_width 8
hide_window_decorations no
remember_window_size yes

# Bell
enable_audio_bell no

# Tab bar
tab_bar_style              powerline
tab_powerline_style        slanted
active_tab_foreground      #1B1D21
active_tab_background      #73BA25
inactive_tab_foreground    #888888
inactive_tab_background    #2D3139

# Color scheme (openSUSE Dark)
foreground            #D4D4D4
background            #1B1D21
selection_foreground  #1B1D21
selection_background  #73BA25
cursor                #73BA25
cursor_text_color     #1B1D21
url_color             #35B9AB

color0  #1B1D21
color1  #E8341C
color2  #73BA25
color3  #F5A623
color4  #4A90D9
color5  #9B59B6
color6  #35B9AB
color7  #D4D4D4
color8  #4A4A4A
color9  #FF6B5B
color10 #8DD44A
color11 #FFD580
color12 #6BAED6
color13 #BC8FD6
color14 #5CCFBF
color15 #FFFFFF

# Keyboard shortcuts
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard
map ctrl+shift+t new_tab
map ctrl+shift+w close_tab
map ctrl+equal  change_font_size all +1.0
map ctrl+minus  change_font_size all -1.0
map ctrl+0      change_font_size all 0
